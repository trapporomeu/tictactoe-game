<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png"  href="src/images/favicon-tictactoe.png">
    <link rel="stylesheet" href="./src/css/styles.css" />
</head>

<body>
    <div class='tic-tac-toe'>
        <div class='tic-tac-toe-row'>
            <div class='tic-tac-toe-cell' number="1" value="">
            </div>
            <div class='tic-tac-toe-cell' number="2" value="">
            </div>
            <div class='tic-tac-toe-cell' number="3" value="">
            </div>
        </div>
        <div class='tic-tac-toe-row'>
            <div class='tic-tac-toe-cell' number="4" value="">
            </div>
            <div class='tic-tac-toe-cell' number="5" value="">
            </div>
            <div class='tic-tac-toe-cell' number="6" value="">
            </div>
        </div>
        <div class='tic-tac-toe-row'>
            <div class='tic-tac-toe-cell' number="7" value="">
            </div>
            <div class='tic-tac-toe-cell' number="8" value="">
            </div>
            <div class='tic-tac-toe-cell' number="9" value="">
            </div>
        </div>
        <div class="refresh">
            <button id="btn-refresh">Reiniciar Partida</button>
        </div>
    </div>



    <script src="./src/js/script.js"></script>
</body>

</html>
